name: Build

# Запускать при push в main, при pull request и вручную (workflow_dispatch)
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  # Сборка для Windows
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build
        run: go build -ldflags="-s -w" -o servo-modquisitor.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: servo-modquisitor-windows
          path: servo-modquisitor.exe

  # Сборка для Linux
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libxkbcommon-x11-dev libgtk-3-dev

      - name: Build
        run: go build -ldflags="-s -w" -o servo-modquisitor-linux .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: servo-modquisitor-linux
          path: servo-modquisitor-linux

