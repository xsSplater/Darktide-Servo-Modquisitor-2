name: Build

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
  release:
    types: [ published ]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Windows
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./Servo-Modquisitor-2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: ./Servo-Modquisitor-2/go.sum
      - name: Download dependencies
        run: go mod download
      - name: Build
        run: go build -ldflags="-s -w" -o servo-modquisitor.exe .
      - name: Prepare files for packaging (Windows)
        run: |
          mkdir Servo-Modquisitor-2
          copy servo-modquisitor.exe Servo-Modquisitor-2\
          copy ..\SortingRules_and_ModDatabase\mandatory_obsolete_incompatible_dependencies.json Servo-Modquisitor-2\
          copy ..\SortingRules_and_ModDatabase\mod_database.json Servo-Modquisitor-2\
      - name: Package Windows (zip)
        run: |
          7z a -tzip Servo-Modquisitor-2-windows.zip .\Servo-Modquisitor-2\
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: servo-modquisitor-windows
          path: ./Servo-Modquisitor-2/Servo-Modquisitor-2-windows.zip

  # Linux
  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Servo-Modquisitor-2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: ./Servo-Modquisitor-2/go.sum
      - name: Download dependencies
        run: go mod download
      - name: Build
        run: go build -ldflags="-s -w" -o servo-modquisitor-linux .
      - name: Prepare files for packaging (Linux)
        run: |
          mkdir Servo-Modquisitor-2
          cp servo-modquisitor-linux Servo-Modquisitor-2/
          cp ../SortingRules_and_ModDatabase/mandatory_obsolete_incompatible_dependencies.json Servo-Modquisitor-2/
          cp ../SortingRules_and_ModDatabase/mod_database.json Servo-Modquisitor-2/
          chmod +x Servo-Modquisitor-2/servo-modquisitor-linux
      - name: Package Linux (tar.gz)
        run: tar -czvf Servo-Modquisitor-2-linux.tar.gz Servo-Modquisitor-2/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: servo-modquisitor-linux
          path: ./Servo-Modquisitor-2/Servo-Modquisitor-2-linux.tar.gz

  # Release
  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/servo-modquisitor-windows/Servo-Modquisitor-2-windows.zip
            artifacts/servo-modquisitor-linux/Servo-Modquisitor-2-linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
