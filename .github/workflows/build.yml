name: Build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
    
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # === Сборка для Windows ===
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./Servo-Modquisitor-2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: ./Servo-Modquisitor-2/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -ldflags="-s -w" -o servo-modquisitor.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: servo-modquisitor-windows
          path: ./Servo-Modquisitor-2/servo-modquisitor.exe

  # === Сборка для Linux ===
  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Servo-Modquisitor-2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: ./Servo-Modquisitor-2/go.sum

      - name: Install dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libxkbcommon-x11-dev libgtk-3-dev

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -ldflags="-s -w" -o servo-modquisitor-linux .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: servo-modquisitor-linux
          path: ./Servo-Modquisitor-2/servo-modquisitor-linux

  # === Создание релиза (только при теге) ===
  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts (для отладки)
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/servo-modquisitor-windows/servo-modquisitor.exe
            artifacts/servo-modquisitor-linux/servo-modquisitor-linux
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
